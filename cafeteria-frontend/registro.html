<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - Sistema de Cafetería</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.v2.css">
    <style>
        /* Estilos específicos para el grid del formulario de registro */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-grid .input-group {
            margin-bottom: 0;
        }

        .full-width {
            grid-column: 1 / -1;
        }
    </style>
</head>
<body>

    <div class="login-container" style="max-width: 550px;">
        <form id="registro-form">
            <h2>Crear una Cuenta</h2>
            <p>Únete para hacer pedidos en línea.</p>
            
            <div class="form-grid">
                <div class="input-group">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" required>
                </div>
                <div class="input-group">
                    <label for="apellido">Apellido</label>
                    <input type="text" id="apellido" required>
                </div>
                <div class="input-group full-width">
                    <label for="correo">Correo Electrónico</label>
                    <input type="email" id="correo" required>
                </div>
                <div class="input-group">
                    <label for="telefono">Teléfono (Opcional)</label>
                    <input type="tel" id="telefono">
                </div>
                <div class="input-group">
                    <label for="usuario">Nombre de Usuario</label>
                    <input type="text" id="usuario" required>
                </div>
                <div class="input-group full-width">
                    <label for="contrasena">Contraseña</label>
                    <input type="password" id="contrasena" required>
                </div>
            </div>
            
            <button type="submit" id="registro-button" style="margin-top: 2rem;">Registrarse</button>
            
            <p id="error-message"></p>
            <p style="margin-top: 1rem;">
                ¿Ya tienes una cuenta? <a href="index.html">Inicia Sesión</a>
            </p>
        </form>
    </div>

    <script src="registro.js" defer></script>
</body>
</html>
