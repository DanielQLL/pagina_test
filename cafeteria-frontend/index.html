<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Cafetería - Login</title>
    <!-- Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* * ==========================================
         * ESTILOS (Originales + Modificación del Ojo)
         * ==========================================
         */

        /* Reset y configuración base */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Formas animadas de fondo */
        .background-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.15;
            animation: float 15s infinite ease-in-out;
        }

        .shape-1 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #FF6B6B, #FFE66D);
            top: -150px;
            left: -150px;
            animation-delay: 0s;
        }

        .shape-2 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, #4ECDC4, #44A08D);
            bottom: -125px;
            right: -125px;
            animation-delay: 2s;
        }

        .shape-3 {
            width: 200px;
            height: 200px;
            background: linear-gradient(135deg, #F7971E, #FFD200);
            top: 50%;
            left: 10%;
            animation-delay: 4s;
        }

        .shape-4 {
            width: 180px;
            height: 180px;
            background: linear-gradient(135deg, #FA709A, #FEE140);
            bottom: 20%;
            left: 70%;
            animation-delay: 6s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
            }
        }

        /* Contenedor principal */
        .login-container {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 25px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            display: grid;
            grid-template-columns: 45% 55%;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        /* Panel lateral izquierdo */
        .login-sidebar {
            background: linear-gradient(135deg, #FF6B6B 0%, #FF8E53 50%, #FFA726 100%);
            padding: 40px 30px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            position: relative;
            overflow: hidden;
        }

        .login-sidebar::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 30px 30px;
            animation: movePattern 20s linear infinite;
        }

        @keyframes movePattern {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 30px); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 25px;
            position: relative;
            z-index: 1;
        }

        .logo-circle {
            width: 80px;
            height: 80px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            backdrop-filter: blur(10px);
            border: 3px solid rgba(255, 255, 255, 0.3);
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 0 0 20px rgba(255, 255, 255, 0);
            }
        }

        .logo-circle i {
            font-size: 40px;
            color: white;
        }

        .logo-container h1 {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .sidebar-content {
            position: relative;
            z-index: 1;
        }

        .sidebar-content h2 {
            font-size: 1.6rem;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .sidebar-content p {
            font-size: 1rem;
            margin-bottom: 25px;
            opacity: 0.95;
        }

        .features {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.15);
            padding: 12px 15px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .feature-item:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateX(10px);
        }

        .feature-item i {
            font-size: 20px;
        }

        .feature-item span {
            font-size: 0.95rem;
            font-weight: 600;
        }

        .floating-icons {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 1;
        }

        .floating-icons i {
            font-size: 30px;
            opacity: 0.3;
            animation: bounce 2s infinite;
        }

        .floating-icons i:nth-child(2) {
            animation-delay: 0.3s;
        }

        .floating-icons i:nth-child(3) {
            animation-delay: 0.6s;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        /* Panel del formulario */
        .login-form-panel {
            background: white;
            padding: 40px 35px;
            display: flex;
            align-items: center;
            overflow-y: auto;
        }

        .form-wrapper {
            width: 100%;
        }

        .form-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .form-header h2 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 8px;
            font-weight: 700;
            background: linear-gradient(135deg, #FF6B6B, #FFA726);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .form-header p {
            color: #666;
            font-size: 1rem;
        }

        /* Grupos de input */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-group label i {
            color: #FF6B6B;
        }

        .input-wrapper {
            position: relative;
        }

        /* --- MODIFICACIÓN: Ajuste de padding para el icono del ojo --- */
        .input-wrapper input {
            width: 100%;
            padding: 13px 45px 13px 18px; /* Padding derecho aumentado para el icono */
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .input-wrapper input:focus {
            outline: none;
            border-color: #FF6B6B;
            background: white;
            box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.1);
        }

        .input-border {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, #FF6B6B, #FFA726);
            transition: width 0.3s ease;
        }

        .input-wrapper input:focus + .input-border {
            width: 100%;
        }

        /* --- MODIFICACIÓN: Estilos para el icono del ojo --- */
        #togglePassword {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #999;
            z-index: 10;
            transition: color 0.3s ease;
        }

        #togglePassword:hover {
            color: #FF6B6B;
        }

        /* Opciones del formulario */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #666;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #FF6B6B;
        }

        .forgot-password {
            color: #FF6B6B;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .forgot-password:hover {
            color: #FFA726;
        }

        /* Botón de login */
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FF6B6B 0%, #FFA726 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-login:hover::before {
            left: 100%;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(255, 107, 107, 0.5);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        /* Mensaje de error */
        #error-message {
            background: linear-gradient(135deg, #fee, #fdd);
            color: #d32f2f;
            padding: 15px;
            border-radius: 10px;
            margin-top: 20px;
            font-size: 0.9rem;
            display: none;
            border-left: 4px solid #d32f2f;
            animation: shake 0.5s;
        }

        #error-message:not(:empty) {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Divisor */
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
            color: #999;
            font-size: 0.85rem;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e0e0e0;
        }

        .divider span {
            padding: 0 15px;
        }

        /* Botones sociales */
        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .social-btn {
            width: 45px;
            height: 45px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }

        .social-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .social-btn.google {
            color: #DB4437;
        }

        .social-btn.google:hover {
            background: #DB4437;
            color: white;
            border-color: #DB4437;
        }

        .social-btn.facebook {
            color: #4267B2;
        }

        .social-btn.facebook:hover {
            background: #4267B2;
            color: white;
            border-color: #4267B2;
        }

        .social-btn.apple {
            color: #000;
        }

        .social-btn.apple:hover {
            background: #000;
            color: white;
            border-color: #000;
        }

        /* Enlace de registro */
        .register-link {
            text-align: center;
            color: #666;
            font-size: 0.9rem;
        }

        .register-link a {
            color: #FF6B6B;
            text-decoration: none;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #FFA726;
            text-decoration: underline;
        }

        /* Responsive Design */
        @media (max-width: 968px) {
            .login-container {
                grid-template-columns: 1fr;
                max-width: 500px;
            }

            .login-sidebar {
                padding: 40px 30px;
            }

            .logo-circle {
                width: 80px;
                height: 80px;
            }

            .logo-circle i {
                font-size: 40px;
            }

            .logo-container h1 {
                font-size: 2.5rem;
            }

            .sidebar-content h2 {
                font-size: 1.5rem;
            }

            .floating-icons {
                display: none;
            }

            .login-form-panel {
                padding: 40px 30px;
            }

            .form-header h2 {
                font-size: 2rem;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .login-sidebar {
                padding: 30px 20px;
            }

            .login-form-panel {
                padding: 30px 20px;
            }

            .social-login {
                gap: 10px;
            }

            .social-btn {
                width: 45px;
                height: 45px;
            }
        }
    </style>
</head>
<body>
    <!-- Elementos de fondo animados -->
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
        <div class="shape shape-4"></div>
    </div>

    <div class="login-container">
        <!-- Panel lateral izquierdo -->
        <div class="login-sidebar">
            <div class="logo-container">
                <div class="logo-circle">
                    <i class="fas fa-mug-hot"></i>
                </div>
                <h1>CaféU</h1>
            </div>
            
            <div class="sidebar-content">
                <h2>Bienvenido de vuelta</h2>
                <p>Tu cafetería universitaria favorita</p>
                
                <div class="features">
                    <div class="feature-item">
                        <i class="fas fa-coffee"></i>
                        <span>Pedidos rápidos</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-credit-card"></i>
                        <span>Pago seguro</span>
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-star"></i>
                        <span>Recompensas</span>
                    </div>
                </div>
            </div>

            <div class="floating-icons">
                <i class="fas fa-cookie-bite"></i>
                <i class="fas fa-ice-cream"></i>
                <i class="fas fa-pizza-slice"></i>
            </div>
        </div>

        <!-- Panel de formulario derecho -->
        <div class="login-form-panel">
            <div class="form-wrapper">
                <div class="form-header">
                    <h2>Iniciar Sesión</h2>
                    <p>Ingresa tus credenciales para continuar</p>
                </div>

                <form id="login-form">
                    <div class="input-group">
                        <label for="username">
                            <i class="fas fa-user"></i>
                            Usuario
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                id="username" 
                                name="username" 
                                placeholder="Ingresa tu usuario" 
                                required
                            >
                            <span class="input-border"></span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            Contraseña
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="password" 
                                id="password" 
                                name="password" 
                                placeholder="Ingresa tu contraseña" 
                                required
                            >
                            <span class="input-border"></span>
                            
                            <!-- === NUEVO: Icono de ojo === -->
                            <i class="fas fa-eye" id="togglePassword"></i>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="remember">
                            <span>Recordarme</span>
                        </label>
                        <a href="#" class="forgot-password">¿Olvidaste tu contraseña?</a>
                    </div>

                    <button type="submit" class="btn-login">
                        <span>Iniciar Sesión</span>
                        <i class="fas fa-arrow-right"></i>
                    </button>

                    <div id="error-message"></div>

                    <div class="divider">
                        <span>O continúa con</span>
                    </div>

                    <div class="social-login">
                        <button type="button" class="social-btn google">
                            <i class="fab fa-google"></i>
                        </button>
                        <button type="button" class="social-btn facebook">
                            <i class="fab fa-facebook-f"></i>
                        </button>
                        <button type="button" class="social-btn apple">
                            <i class="fab fa-apple"></i>
                        </button>
                    </div>

                    <div class="register-link">
                        ¿No tienes una cuenta? 
                        <a href="registro.html">Regístrate gratis</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // 1. Esperar a que todo el HTML esté cargado
        document.addEventListener('DOMContentLoaded', () => {

            // 2. Obtener los elementos del formulario
            const loginForm = document.getElementById('login-form');
            const usernameInput = document.getElementById('username');
            const passwordInput = document.getElementById('password');
            const errorMessage = document.getElementById('error-message');
            
            // --- NUEVO: Elemento Toggle Ojo ---
            const togglePassword = document.getElementById('togglePassword');

            // --- NUEVO: Lógica para mostrar/ocultar contraseña ---
            togglePassword.addEventListener('click', function () {
                // Alternar el atributo type
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                // Alternar el icono (ojo abierto/cerrado/tachado)
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });

            // 3. Escuchar cuando el usuario intente enviar el formulario
            loginForm.addEventListener('submit', async (event) => {
                // 4. Evitar que la página se recargue (comportamiento por defecto)
                event.preventDefault();

                // 5. Obtener los valores que el usuario escribió
                const usuario = usernameInput.value;
                const contrasena = passwordInput.value;

                // Limpiamos errores previos
                errorMessage.textContent = '';

                try {
                    // 6. Enviar los datos al Backend
                    const response = await fetch('/api/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            usuario: usuario,
                            contrasena: contrasena
                        })
                    });

                    // 7. Analizar la respuesta del backend
                    if (response.ok) {
                        // ¡Éxito! El servidor nos dio un 200 (OK)
                        const data = await response.json();
                        
                        // 8. Redirigir según el ROL
                        if (data.rol === 'Administrador') {
                            // Limpiamos cualquier dato de cliente que pudiera existir
                            localStorage.removeItem('cliente_id');
                            localStorage.removeItem('cliente_usuario');
                            window.location.href = 'admin.html';

                        } else if (data.rol === 'Cajero') {
                            // ¡¡AQUÍ ESTÁ LA MAGIA NUEVA!!
                            localStorage.removeItem('cliente_id');
                            localStorage.removeItem('cliente_usuario');
                            // Guardamos quién es el cajero
                            localStorage.setItem('cajero_id', data.id);
                            localStorage.setItem('cajero_usuario', data.usuario);
                            window.location.href = 'cajero.html';

                        } else if (data.rol === 'Cliente') {
                            // ¡¡AQUÍ ESTÁ LA MAGIA!!
                            // Guardamos quién es el cliente en la memoria del navegador.
                            localStorage.setItem('cliente_id', data.id);
                            localStorage.setItem('cliente_usuario', data.usuario);
                            window.location.href = 'cliente.html';
                        }

                    } else {
                        // Error (ej: 401 - No autorizado)
                        const errorData = await response.text();
                        errorMessage.textContent = errorData;
                    }
                } catch (error) {
                    // Error de red (ej: el backend no está encendido)
                    console.error('Error de conexión:', error);
                    errorMessage.textContent = 'No se pudo conectar al servidor. ¿Está encendido?';
                }
            });
        });
    </script>
</body>
</html>
